# Symbol
symbol: "BTCUSD"

# Symbol
target_type: "atr"
atr_multiplier: 5.4
tp_multiplier: 1.44
atr_period: 9
confidence_threshold: 0.45

# Data
data_path: "1m"
sequence_length: 270
n_ahead: 9
feature_symbols:
  BCHUSD: false
  BTCUSD: true
  ETHUSD: true
  LTCUSD: false
  XRPUSD: false
  ADAUSD: false
  AVAXUSD: false
  AXSUSD: false
  DOGEUSD: false
  DOTUSD: false
  EOSUSD: false
  FILUSD: false
  LINKUSD: false
  MATICUSD: false
  MIOTAUSD: false
  SOLUSD: false
  TRXUSD: false
  UNIUSD: false
  XLMUSD: false

features:
  log_returns:
    enabled: true
    periods: [1, 5, 15, 60]
  candle_ratios:
    enabled: true
  garman_klass:
    enabled: true
    windows: [5, 15, 60]
  rolling_volatility:
    enabled: true
    windows: [5, 15, 60]
  bollinger:
    enabled: true
    periods: [20]
    std: 2.0
  price_to_sma:
    enabled: true
    periods: [15]
  price_to_ema:
    enabled: true
    periods: [5, 15, 50]
  ema_cross:
    enabled: true
    pairs:
      - [9, 18]
      - [18, 54]
  rsi:
    enabled: true
    periods: [7, 14]
  adx:
    enabled: true
    periods: [9]
  macd:
    enabled: true
    fast: 3
    slow: 6
    signal: 9
  higher_timeframes:
    enabled: false
    timeframes: [15, 60]
    log_return_periods: [1]
    rsi_periods: [14]
    macd:
      fast: 12
      slow: 26
      signal: 9
  time:
    enabled: true
    hour: true
    minute: true
    day_of_week: true

# Labels
threshold_pct: 1.0
stop_loss_pct: 0.5

# Model
hidden_size: 100
sub_dim: 20

# Training
batch_size: 256
learning_rate: 0.00001
epochs: 108
train_test_split: 0.8
seed: 42

# Output
model_output: "model.onnx"
norm_output: "norm_params.mqh"